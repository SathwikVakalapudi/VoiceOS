<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VoiceOS · Live Call</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#2a3240;--text:#e6edf3;
        --muted:#8b98a9;--accent:#4f9cff;--accent2:#1f6feb;--ok:#3fb950;--warn:#d29922;--bad:#f85149;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.55 -apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:16px;margin:0;font-weight:600}.sub{color:var(--muted);font-size:12px}
  main{max-width:820px;margin:0 auto;padding:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
  label{display:block;color:var(--muted);font-size:12px;margin:12px 0 5px}
  select,input,textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font:inherit}
  textarea{resize:vertical;font-family:ui-monospace,Consolas,monospace;font-size:12.5px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>div{flex:1;min-width:180px}
  button{border:0;border-radius:8px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .call{background:var(--ok);color:#06210e}.end{background:var(--bad);color:#fff}.ghost{background:var(--panel2);color:var(--text)}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .status{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:10px;background:var(--panel2);font-weight:600;margin-bottom:14px;font-size:15px}
  .orb{width:16px;height:16px;border-radius:50%;background:var(--muted);flex:none}
  .orb.listen{background:var(--ok);box-shadow:0 0 14px var(--ok);animation:pulse 1.4s infinite}
  .orb.rec{background:var(--bad);box-shadow:0 0 16px var(--bad);animation:pulse .7s infinite}
  .orb.think{background:var(--warn);box-shadow:0 0 14px var(--warn)}
  .orb.speak{background:var(--accent);box-shadow:0 0 16px var(--accent);animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .meter{flex:1;height:8px;background:#0b0e13;border-radius:4px;overflow:hidden;min-width:90px;position:relative}
  .meter>#meterFill{height:100%;width:0;background:var(--ok);transition:width .04s}
  .meter>#thr{position:absolute;top:0;bottom:0;width:2px;background:var(--warn)}
  .chat{min-height:230px;max-height:44vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px}
  .msg{max-width:82%;padding:11px 15px;border-radius:14px;white-space:pre-wrap;font-size:15px}
  .msg.bot{background:var(--panel2);align-self:flex-start;border-bottom-left-radius:3px}
  .msg.user{background:var(--accent2);align-self:flex-end;border-bottom-right-radius:3px}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  .box{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .box.bad{background:rgba(248,81,73,.12);border:1px solid var(--bad);color:#f6b0ac}
  .hidden{display:none}
  #diag{background:#05070a;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:ui-monospace,Consolas,monospace;
        font-size:11.5px;color:#9fb2c8;max-height:140px;overflow-y:auto;white-space:pre-wrap;margin-top:12px}
</style>
</head>
<body>
<header><span class="orb" id="hdot"></span><h1>VoiceOS</h1><span class="sub">Live Call — talk naturally, it listens and replies on its own</span></header>
<main>
  <div id="ctxbad" class="box bad hidden"></div>

  <div class="card" id="setup">
    <div class="row">
      <div><label>Language</label>
        <select id="lang">
          <option value="hi-IN">Hindi — हिन्दी</option>
          <option value="en-IN">English</option>
          <option value="te-IN">Telugu — తెలుగు</option>
          <option value="ta-IN">Tamil — தமிழ்</option>
          <option value="bn-IN">Bengali — বাংলা</option>
          <option value="gu-IN">Gujarati — ગુજરાતી</option>
        </select>
      </div>
      <div><label>Opening line (optional)</label><input id="firstmsg" placeholder="leave blank to auto-open"/></div>
    </div>
    <label>Campaign prompt</label>
    <textarea id="prompt" rows="9" placeholder="You are a courteous, neutral telephone survey caller…"></textarea>
    <label>Mic sensitivity <span id="sensVal" class="hint"></span></label>
    <input type="range" id="sens" min="1" max="10" value="5"/>
    <div class="bar" style="margin-top:14px">
      <button class="call" id="startBtn">📞  Start call</button>
      <span class="hint">Just talk — no buttons during the call. Watch the meter move when you speak.</span>
    </div>
  </div>

  <div class="card hidden" id="live">
    <div class="status"><span class="orb" id="orb"></span><span id="statusText">Connecting…</span>
      <div class="meter"><div id="meterFill"></div><div id="thr"></div></div></div>
    <div class="chat" id="chat"></div>
    <div class="bar" style="margin-top:14px">
      <button class="end" id="endBtn">■ End call</button>
      <span class="hint" id="liveHint"></span>
    </div>
  </div>
  <div id="diag"></div>
</main>
<script>
const $=s=>document.querySelector(s);
let lang="hi-IN", running=false, history=[], phase="idle";
let stream=null, ac=null, proc=null, srcNode=null;
// VAD state
let inSpeech=false, utter=[], preroll=[], speechMs=0, silenceMs=0, speechRun=0, noiseFloor=0.01, sensMargin=0.02;
// tuning
const PREROLL_MS=350, END_SILENCE_MS=850, MIN_SPEECH_MS=300, MIN_LEVEL=0.012, ONSET_MS=90;
$("#sens").oninput=()=>{ sensMargin=0.006*(11-$("#sens").value)/5 + 0.004; $("#sensVal").textContent="(threshold "+sensMargin.toFixed(3)+")"; };
$("#sens").oninput();

function log(m){ const d=$("#diag"); d.textContent+=("["+new Date().toLocaleTimeString()+"] "+m+"\n"); d.scrollTop=d.scrollHeight; }
function setPhase(p,txt){ phase=p; const c=({listen:"listen",rec:"rec",think:"think",speak:"speak"})[p]||"";
  $("#orb").className="orb "+c; $("#hdot").className="orb "+c; $("#statusText").textContent=txt; }
function addMsg(t,who){ const d=document.createElement("div"); d.className="msg "+who; d.textContent=t; $("#chat").appendChild(d); $("#chat").scrollTop=$("#chat").scrollHeight; }
function showTimings(t){ const p=[]; if(t.stt!=null)p.push("STT "+t.stt+"s"); if(t.llm!=null)p.push("LLM "+t.llm+"s"); if(t.total!=null)p.push("total "+t.total+"s");
  const d=document.createElement("div"); d.className="hint"; d.style.marginTop="-6px"; d.textContent="⏱ "+p.join(" · "); $("#chat").appendChild(d); }

if(!window.isSecureContext){ $("#ctxbad").classList.remove("hidden"); $("#ctxbad").innerHTML="⚠️ Open on <b>http://localhost:8080/live</b> (not an IP) — mic needs that."; }

async function api(path,body){ const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||r.statusText); } return r.json(); }
const blobToB64=b=>new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result.split(",")[1]); fr.readAsDataURL(b); });

// ---- streaming TTS playback ----
let nextTime=0, ttsAbort=null, activeSources=[];
function stopTTS(){ if(ttsAbort){try{ttsAbort.abort()}catch(_){}; ttsAbort=null;} activeSources.forEach(s=>{try{s.stop()}catch(_){}}); activeSources=[]; if(ac) nextTime=ac.currentTime; }
async function streamTTS(text){
  if(!text) return; ttsAbort=new AbortController(); let res;
  try{ res=await fetch("/api/live/voice/tts-stream",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text,language:lang}),signal:ttsAbort.signal}); }catch(e){ return; }
  const rate=parseInt(res.headers.get("X-Sample-Rate")||"24000"); const reader=res.body.getReader();
  nextTime=Math.max(nextTime, ac.currentTime+0.06); let leftover=new Uint8Array(0);
  try{ while(true){ const {done,value}=await reader.read(); if(done)break;
    let buf=new Uint8Array(leftover.length+value.length); buf.set(leftover,0); buf.set(value,leftover.length);
    const usable=buf.length-(buf.length%2); if(usable<2){leftover=buf;continue;}
    const pcm=new Int16Array(buf.buffer.slice(0,usable)); leftover=buf.slice(usable);
    const f=new Float32Array(pcm.length); for(let i=0;i<pcm.length;i++) f[i]=pcm[i]/32768;
    const ab=ac.createBuffer(1,f.length,rate); ab.getChannelData(0).set(f);
    const s=ac.createBufferSource(); s.buffer=ab; s.connect(ac.destination); s.start(nextTime); nextTime+=ab.duration; activeSources.push(s);
  } }catch(e){}
  ttsAbort=null; const remain=(nextTime-ac.currentTime)*1000; if(remain>0) await new Promise(r=>setTimeout(r,remain));
}

// ---- audio helpers ----
function rms(f){ let s=0; for(let i=0;i<f.length;i++) s+=f[i]*f[i]; return Math.sqrt(s/f.length); }
function resample16k(f32, srcRate){
  const ratio=srcRate/16000, outLen=Math.floor(f32.length/ratio), out=new Int16Array(outLen);
  // Average each source window (anti-aliasing low-pass) instead of decimating —
  // pure decimation folds >8kHz energy back as noise and wrecks STT. ratio==1
  // (16k context) makes this a plain float->int16 copy.
  for(let i=0;i<outLen;i++){
    const start=Math.floor(i*ratio), end=Math.max(start+1, Math.floor((i+1)*ratio));
    let sum=0,n=0; for(let j=start;j<end&&j<f32.length;j++){ sum+=f32[j]; n++; }
    let s=n?sum/n:0; s=Math.max(-1,Math.min(1,s)); out[i]=s<0?s*32768:s*32767;
  }
  return out;
}
function wavBlob(int16){
  const buf=new ArrayBuffer(44+int16.length*2), dv=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF"); dv.setUint32(4,36+int16.length*2,true); ws(8,"WAVE"); ws(12,"fmt ");
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true); dv.setUint32(24,16000,true);
  dv.setUint32(28,32000,true); dv.setUint16(32,2,true); dv.setUint16(34,16,true); ws(36,"data"); dv.setUint32(40,int16.length*2,true);
  for(let i=0;i<int16.length;i++) dv.setInt16(44+i*2,int16[i],true);
  return new Blob([buf],{type:"audio/wav"});
}

// ---- the audio callback: continuous capture + VAD + pre-roll ----
function trimPreroll(frameMs){ let ms=preroll.length*frameMs; while(ms>PREROLL_MS){ preroll.shift(); ms-=frameMs; } }
function onAudio(e){
  if(!running) return;
  const frame=new Float32Array(e.inputBuffer.getChannelData(0));  // copy (buffer is reused)
  const frameMs=frame.length/ac.sampleRate*1000;
  const level=rms(frame);
  $("#meterFill").style.width=Math.min(100,level*350)+"%";
  const thr=Math.max(MIN_LEVEL, noiseFloor+sensMargin);
  $("#thr").style.left=Math.min(100,thr*350)+"%";
  if(phase!=="listen" && phase!=="rec") return;         // don't capture while thinking/speaking

  if(level>thr){                                          // --- voiced frame ---
    silenceMs=0;
    if(inSpeech){ utter.push(frame); speechMs+=frameMs; }
    else{                                                 // onset debounce: need ONSET_MS of voice
      speechRun+=frameMs; preroll.push(frame); trimPreroll(frameMs);
      if(speechRun>=ONSET_MS){ inSpeech=true; utter=preroll.slice(); speechMs=speechRun; setPhase("rec","🎙️ बोलते रहिए… / Go on…"); }
    }
  } else {                                                // --- silent frame ---
    speechRun=0;
    if(inSpeech){ utter.push(frame); silenceMs+=frameMs; if(silenceMs>=END_SILENCE_MS){ inSpeech=false; endUtter(); } }
    else{ preroll.push(frame); trimPreroll(frameMs); noiseFloor=0.92*noiseFloor+0.08*level; }
  }
}

function endUtter(){
  const dur=speechMs; const frames=utter; utter=[]; preroll=[]; speechMs=0; silenceMs=0;
  if(dur<MIN_SPEECH_MS){ log("dropped short "+Math.round(dur)+"ms"); setPhase("listen","सुन रहे हैं — बोलिए / Listening…"); return; }
  let total=0; frames.forEach(f=>total+=f.length); const merged=new Float32Array(total); let o=0; frames.forEach(f=>{merged.set(f,o); o+=f.length;});
  const int16=resample16k(merged, ac.sampleRate);
  log("utterance "+Math.round(dur)+"ms -> "+int16.length+" samples @16k");
  setPhase("think","सोच रहे हैं… / Thinking…");
  sendUtter(wavBlob(int16));
}

async function sendUtter(blob){
  try{
    const b64=await blobToB64(blob);
    const j=await api("/api/live/voice/turn",{audio_b64:b64,system_prompt:$("#prompt").value,history,language:lang,stream:true});
    if(j.error){ log("turn: "+j.error); }
    else if(!j.transcript){ log("empty transcript"); }
    else{ addMsg(j.transcript,"user"); history.push({role:"user",content:j.transcript});
      addMsg(j.reply,"bot"); history.push({role:"assistant",content:j.reply}); if(j.timings) showTimings(j.timings);
      setPhase("speak","🔊 बोल रहे हैं… / Speaking…"); await streamTTS(j.reply); }
  }catch(e){ log("turn error: "+e.message); }
  if(running) setPhase("listen","सुन रहे हैं — बोलिए / Listening…");
}

async function startCall(){
  if(!$("#prompt").value.trim()){ alert("Paste the campaign prompt first."); return; }
  lang=$("#lang").value; history=[]; running=true; inSpeech=false; utter=[]; preroll=[]; speechRun=0; noiseFloor=0.01;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}); }
  catch(e){ $("#ctxbad").classList.remove("hidden"); $("#ctxbad").textContent="Microphone blocked — allow it in the address bar and reload."; running=false; return; }
  // Capture natively at 16 kHz (the browser's high-quality resampler) so STT
  // gets clean audio — avoids the aliasing from decimating 48k->16k ourselves.
  const AC=window.AudioContext||window.webkitAudioContext;
  try{ ac=new AC({sampleRate:16000}); }catch(_){ ac=new AC(); }
  await ac.resume();
  srcNode=ac.createMediaStreamSource(stream);
  proc=ac.createScriptProcessor(1024,1,1); proc.onaudioprocess=onAudio;  // ~64ms frames @16k
  const mute=ac.createGain(); mute.gain.value=0;                 // route through silent gain so the callback runs w/o feedback
  srcNode.connect(proc); proc.connect(mute); mute.connect(ac.destination);
  log("mic @ "+ac.sampleRate+"Hz");
  $("#setup").classList.add("hidden"); $("#live").classList.remove("hidden"); $("#chat").innerHTML="";
  $("#liveHint").textContent=lang+" · Sarvam + Gemini + Cartesia";
  setPhase("think","Calibrating mic (stay quiet ~1s)…");
  setTimeout(async ()=>{
    log("noise floor "+noiseFloor.toFixed(3)+", threshold "+Math.max(MIN_LEVEL,noiseFloor+sensMargin).toFixed(3));
    try{ const j=await api("/api/live/voice/open",{system_prompt:$("#prompt").value,first_message:$("#firstmsg").value.trim()||null,language:lang,stream:true});
      history.push({role:"assistant",content:j.reply}); addMsg(j.reply,"bot"); setPhase("speak","🔊 बोल रहे हैं…"); await streamTTS(j.reply);
    }catch(e){ log("open error: "+e.message); }
    if(running) setPhase("listen","सुन रहे हैं — बोलिए / Listening…");
  },1200);
}
function endCall(){ running=false; stopTTS();
  try{ proc&&(proc.onaudioprocess=null); srcNode&&srcNode.disconnect(); proc&&proc.disconnect(); }catch(_){}
  try{ stream&&stream.getTracks().forEach(t=>t.stop()); }catch(_){}
  try{ ac&&ac.close(); }catch(_){}; ac=null;
  setPhase("idle","Ended"); $("#live").classList.add("hidden"); $("#setup").classList.remove("hidden"); }

$("#startBtn").onclick=startCall; $("#endBtn").onclick=endCall;
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VoiceOS · Live Call</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#2a3240;--text:#e6edf3;
        --muted:#8b98a9;--accent:#4f9cff;--accent2:#1f6feb;--ok:#3fb950;--warn:#d29922;--bad:#f85149;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.55 -apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:16px;margin:0;font-weight:600}.sub{color:var(--muted);font-size:12px}
  main{max-width:820px;margin:0 auto;padding:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
  label{display:block;color:var(--muted);font-size:12px;margin:12px 0 5px}
  select,input,textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font:inherit}
  textarea{resize:vertical;font-family:ui-monospace,Consolas,monospace;font-size:12.5px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>div{flex:1;min-width:180px}
  button{border:0;border-radius:8px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer}
  .call{background:var(--ok);color:#06210e}.end{background:var(--bad);color:#fff}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .status{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:10px;background:var(--panel2);font-weight:600;margin-bottom:14px;font-size:15px}
  .orb{width:16px;height:16px;border-radius:50%;background:var(--muted);flex:none}
  .orb.listen{background:var(--ok);box-shadow:0 0 14px var(--ok);animation:pulse 1.4s infinite}
  .orb.rec{background:var(--bad);box-shadow:0 0 16px var(--bad);animation:pulse .7s infinite}
  .orb.think{background:var(--warn);box-shadow:0 0 14px var(--warn)}
  .orb.speak{background:var(--accent);box-shadow:0 0 16px var(--accent);animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .meter{flex:1;height:8px;background:#0b0e13;border-radius:4px;overflow:hidden;min-width:90px}
  .meter>#meterFill{height:100%;width:0;background:var(--ok);transition:width .05s}
  .chat{min-height:230px;max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px}
  .msg{max-width:82%;padding:11px 15px;border-radius:14px;white-space:pre-wrap;font-size:15px}
  .msg.bot{background:var(--panel2);align-self:flex-start;border-bottom-left-radius:3px}
  .msg.user{background:var(--accent2);align-self:flex-end;border-bottom-right-radius:3px}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  .box{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .box.bad{background:rgba(248,81,73,.12);border:1px solid var(--bad);color:#f6b0ac}
  .hidden{display:none}
  #diag{background:#05070a;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:#9fb2c8;max-height:130px;overflow-y:auto;white-space:pre-wrap;margin-top:12px}
</style>
</head>
<body>
<header><span class="orb" id="hdot"></span><h1>VoiceOS</h1><span class="sub">Live Call — server-side Silero VAD · talk naturally</span></header>
<main>
  <div id="ctxbad" class="box bad hidden"></div>
  <div class="card" id="setup">
    <div class="row">
      <div><label>Language</label>
        <select id="lang">
          <option value="hi-IN">Hindi — हिन्दी</option><option value="en-IN">English</option>
          <option value="te-IN">Telugu — తెలుగు</option><option value="ta-IN">Tamil — தமிழ்</option>
          <option value="bn-IN">Bengali — বাংলা</option><option value="gu-IN">Gujarati — ગુజરાતી</option>
        </select>
      </div>
      <div><label>Opening line (optional)</label><input id="firstmsg" placeholder="leave blank to auto-open"/></div>
    </div>
    <label>Campaign prompt</label>
    <textarea id="prompt" rows="9" placeholder="You are a courteous, neutral telephone survey caller…"></textarea>
    <div class="bar" style="margin-top:16px">
      <button class="call" id="startBtn">📞  Start call</button>
      <span class="hint">Real speech detection runs on the server (Silero VAD). Just talk.</span>
    </div>
  </div>
  <div class="card hidden" id="live">
    <div class="status"><span class="orb" id="orb"></span><span id="statusText">Connecting…</span>
      <div class="meter"><div id="meterFill"></div></div></div>
    <div class="chat" id="chat"></div>
    <div class="bar" style="margin-top:14px"><button class="end" id="endBtn">■ End call</button><span class="hint" id="liveHint"></span></div>
  </div>
  <div id="diag"></div>
</main>
<script>
const $=s=>document.querySelector(s);
let ws=null, ac=null, proc=null, srcNode=null, stream=null, running=false;
let ttsRate=24000, nextTime=0;
function log(m){ const d=$("#diag"); d.textContent+=("["+new Date().toLocaleTimeString()+"] "+m+"\n"); d.scrollTop=d.scrollHeight; }
function setPhase(p,t){ const c=({listen:"listen",think:"think",speak:"speak"})[p]||""; $("#orb").className="orb "+c; $("#hdot").className="orb "+c; $("#statusText").textContent=t; }
function addMsg(t,who){ const d=document.createElement("div"); d.className="msg "+who; d.textContent=t; $("#chat").appendChild(d); $("#chat").scrollTop=$("#chat").scrollHeight; }
if(!window.isSecureContext){ $("#ctxbad").classList.remove("hidden"); $("#ctxbad").innerHTML="⚠️ Open on <b>http://localhost:8080/live</b> (not an IP) — mic needs that."; }

function playChunk(ab){
  const pcm=new Int16Array(ab); const f=new Float32Array(pcm.length);
  for(let i=0;i<pcm.length;i++) f[i]=pcm[i]/32768;
  const buf=ac.createBuffer(1,f.length,ttsRate); buf.getChannelData(0).set(f);
  const s=ac.createBufferSource(); s.buffer=buf; s.connect(ac.destination);
  nextTime=Math.max(nextTime, ac.currentTime+0.05); s.start(nextTime); nextTime+=buf.duration;
}

async function startCall(){
  if(!$("#prompt").value.trim()){ alert("Paste the campaign prompt first."); return; }
  const lang=$("#lang").value;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}); }
  catch(e){ $("#ctxbad").classList.remove("hidden"); $("#ctxbad").textContent="Microphone blocked — allow it and reload."; return; }
  const AC=window.AudioContext||window.webkitAudioContext;
  try{ ac=new AC({sampleRate:16000}); }catch(_){ ac=new AC(); }
  await ac.resume(); log("mic @ "+ac.sampleRate+"Hz");
  running=true; $("#setup").classList.add("hidden"); $("#live").classList.remove("hidden"); $("#chat").innerHTML="";
  $("#liveHint").textContent=lang+" · Silero VAD + Sarvam + Gemini + Cartesia";

  const proto = location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(proto+"//"+location.host+"/ws/call"); ws.binaryType="arraybuffer";
  setPhase("think","Connecting…");
  ws.onopen=()=>{ log("ws open"); ws.send(JSON.stringify({system_prompt:$("#prompt").value, first_message:$("#firstmsg").value.trim()||null, language:lang})); };
  ws.onmessage=(ev)=>{
    if(typeof ev.data!=="string"){ playChunk(ev.data); return; }
    const m=JSON.parse(ev.data);
    if(m.type==="audio_start"){ ttsRate=m.rate||24000; nextTime=ac.currentTime; setPhase("speak","🔊 बोल रहे हैं… / Speaking…"); }
    else if(m.type==="audio_end"){ /* playback tail continues */ }
    else if(m.type==="listening"){ setPhase("listen","सुन रहे हैं — बोलिए / Listening…"); }
    else if(m.type==="thinking"){ setPhase("think","सोच रहे हैं… / Thinking…"); }
    else if(m.type==="transcript"){ addMsg(m.text,"user"); }
    else if(m.type==="reply"){ addMsg(m.text,"bot"); }
    else if(m.type==="error"){ addMsg("⚠️ "+m.text,"bot"); log("error: "+m.text); }
  };
  ws.onclose=()=>{ log("ws closed"); if(running) setPhase("","Disconnected"); };
  ws.onerror=()=>log("ws error");

  // stream mic continuously as 16k int16 PCM
  srcNode=ac.createMediaStreamSource(stream);
  proc=ac.createScriptProcessor(1024,1,1);
  proc.onaudioprocess=(e)=>{
    const f=e.inputBuffer.getChannelData(0);
    let peak=0; for(let i=0;i<f.length;i++){ const a=Math.abs(f[i]); if(a>peak)peak=a; }
    $("#meterFill").style.width=Math.min(100,peak*160)+"%";
    if(!ws||ws.readyState!==1) return;
    const i16=new Int16Array(f.length);
    for(let i=0;i<f.length;i++){ let s=f[i]; s=s>1?1:s<-1?-1:s; i16[i]=s<0?s*32768:s*32767; }
    ws.send(i16.buffer);
  };
  const mute=ac.createGain(); mute.gain.value=0;
  srcNode.connect(proc); proc.connect(mute); mute.connect(ac.destination);
}
function endCall(){ running=false; try{ws&&ws.close()}catch(_){}
  try{ proc&&(proc.onaudioprocess=null); srcNode&&srcNode.disconnect(); proc&&proc.disconnect(); }catch(_){}
  try{ stream&&stream.getTracks().forEach(t=>t.stop()); }catch(_){}
  try{ ac&&ac.close(); }catch(_){}; ac=null;
  setPhase("","Ended"); $("#live").classList.add("hidden"); $("#setup").classList.remove("hidden"); }
$("#startBtn").onclick=startCall; $("#endBtn").onclick=endCall;
</script>
</body>
</html>

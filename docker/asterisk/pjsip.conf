; PJSIP config for local VoiceOS testing.
; One softphone extension (1001) registers here, dials 100, and Asterisk
; bridges the call to VoiceOS over AudioSocket. No real SIP trunk needed.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; --- Docker Desktop (Windows/Mac) NAT: if you get one-way / no audio, set
;     these to your host's LAN IP so Asterisk advertises a reachable address
;     for RTP, and declare your Docker/LAN subnet as local. ---
; external_media_address=192.168.1.50
; external_signaling_address=192.168.1.50
; local_net=172.16.0.0/12
; local_net=192.168.0.0/16

; ---- Softphone endpoint: register as 1001 / verysecret ----
[1001]
type=endpoint
context=voiceos-test          ; dialplan the softphone can reach
disallow=all
allow=ulaw                    ; G.711 mu-law — 8 kHz, what VoiceOS transcodes
allow=alaw
direct_media=no               ; keep media on Asterisk so it can bridge to VoiceOS
dtmf_mode=rfc4733             ; out-of-band DTMF
auth=1001-auth
aors=1001

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=verysecret           ; CHANGE ME (local test credential only)

[1001]
type=aor
max_contacts=1
remove_existing=yes

; Dialplan for local VoiceOS testing.

[voiceos-test]
; Dial 100 -> talk to the VoiceOS AI (bridged over AudioSocket).
exten => 100,1,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 ; AudioSocket(<call-uuid>,<host:port>): connects to the VoiceOS AudioSocket
 ; server; `voiceos` resolves to the compose service. If your Asterisk build
 ; won't resolve the hostname, use the container IP instead.
 same => n,AudioSocket(${UUID()},voiceos:8090)
 same => n,Hangup()

; Dial 600 -> plain echo test. Validates SIP + RTP audio *without* VoiceOS;
; if 600 has two-way audio but 100 doesn't, the problem is the bridge/VoiceOS,
; not your SIP/RTP/NAT setup.
exten => 600,1,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; ---- Real trunk: inbound calls to your DID land here ----
[voiceos-inbound]
exten => _[+0-9].,1,Answer()
 same => n,AudioSocket(${UUID()},voiceos:8090)
 same => n,Hangup()

; ---- Real trunk: outbound calls (ARI originate lands the answered leg here) ----
; ari_originate(endpoint=PJSIP/<number>@<trunk>, context=voiceos-outbound,
; extension=s, callerId=<your DID>) -> when the callee answers, this runs.
[voiceos-outbound]
exten => s,1,Answer()
 same => n,AudioSocket(${UUID()},voiceos:8090)
 same => n,Hangup()
